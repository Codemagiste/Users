<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema de Transferência TI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f5;
}

header{
background:#1f2937;
color:white;
padding:15px;
}

.container{
padding:20px;
}

input,select,button{
padding:8px;
margin:4px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

#login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#111;
}

#loginBox{
background:white;
padding:30px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<div id="loginBox">

<h2>Login Sistema</h2>

<input id="user" placeholder="Usuário"><br>
<input id="pass" type="password" placeholder="Senha"><br>

<select id="perfil">
<option value="admin">Admin</option>
<option value="loja">Loja</option>
<option value="tecnico">Técnico</option>
</select>

<br>
<button onclick="login()">Entrar</button>

</div>

</div>

<!-- SISTEMA -->

<div id="app" style="display:none">

<header>

Sistema TI Online

<button onclick="logout()" style="float:right">Sair</button>

</header>

<div class="container">

<h3>Cadastrar Equipamento</h3>

<input id="pat" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="loja" placeholder="Loja">

<button onclick="salvarEquipamento()">Salvar</button>

<h3>Equipamentos</h3>

<table>

<thead>
<tr>
<th>Patrimônio</th>
<th>Equipamento</th>
<th>Loja</th>
</tr>
</thead>

<tbody id="tabelaEquip"></tbody>

</table>

<h3>Transferência</h3>

<input id="patTransfer" placeholder="Patrimônio">

<input id="destinoTransfer" placeholder="Destino">

<input id="responsavel" placeholder="Responsável">

<button onclick="transferir()">Transferir</button>

<h3>Movimentações</h3>

<button onclick="exportarPDF()">Exportar PDF</button>

<table>

<thead>
<tr>
<th>Patrimônio</th>
<th>Origem</th>
<th>Destino</th>
<th>Status</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaMov"></tbody>

</table>

<h3>Gráfico</h3>

<canvas id="grafico"></canvas>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",
authDomain: "romtech-e1e15.firebaseapp.com",
projectId: "romtech-e1e15",
storageBucket: "romtech-e1e15.firebasestorage.app",
messagingSenderId: "153455301031",
appId: "1:153455301031:web:6933f2bc3f6e485c2f2682",
measurementId: "G-1DBYYTTXM4"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

let equipamentos=[]
let movimentacoes=[]

window.login=function(){

login.style.display="none"
appTela()

}

function appTela(){

document.getElementById("app").style.display="block"

carregarEquipamentos()
carregarMovimentacoes()

}

window.logout=function(){

location.reload()

}

window.salvarEquipamento=async function(){

await addDoc(collection(db,"equipamentos"),{

patrimonio:pat.value,
nome:nome.value,
loja:loja.value

})

pat.value=""
nome.value=""
loja.value=""

}

function carregarEquipamentos(){

onSnapshot(collection(db,"equipamentos"),snapshot=>{

equipamentos=[]

snapshot.forEach(doc=>{
equipamentos.push(doc.data())
})

renderEquip()

})

}

function renderEquip(){

let html=""

equipamentos.forEach(e=>{

html+=`
<tr>
<td>${e.patrimonio}</td>
<td>${e.nome}</td>
<td>${e.loja}</td>
</tr>
`

})

tabelaEquip.innerHTML=html

}

window.transferir=async function(){

let eq=equipamentos.find(e=>e.patrimonio==patTransfer.value)

if(!eq){

alert("Equipamento não encontrado")
return

}

let mov={

id:Date.now(),

patrimonio:eq.patrimonio,
origem:eq.loja,
destino:destinoTransfer.value,
responsavel:responsavel.value,
status:"Em transporte",
data:new Date().toLocaleString()

}

await addDoc(collection(db,"movimentacoes"),mov)

gerarCupom(mov)

patTransfer.value=""
destinoTransfer.value=""
responsavel.value=""

}

function gerarCupom(m){

let link=location.origin+location.pathname+"?id="+m.id

QRCode.toDataURL(link,function(err,url){

let w=window.open("","","width=300,height=500")

w.document.write(`

<h3>Transferência TI</h3>

Patrimônio: ${m.patrimonio}<br>
Origem: ${m.origem}<br>
Destino: ${m.destino}<br>

<img src="${url}">

`)

w.print()

})

}

function carregarMovimentacoes(){

onSnapshot(collection(db,"movimentacoes"),snapshot=>{

movimentacoes=[]

snapshot.forEach(doc=>{
movimentacoes.push(doc.data())
})

renderMov()
atualizarGrafico()

})

}

function renderMov(){

let html=""

movimentacoes.forEach(m=>{

html+=`
<tr>
<td>${m.patrimonio}</td>
<td>${m.origem}</td>
<td>${m.destino}</td>
<td>${m.status}</td>
<td>${m.data}</td>
</tr>
`

})

tabelaMov.innerHTML=html

}

let chart

function atualizarGrafico(){

let total=movimentacoes.length
let entregues=movimentacoes.filter(m=>m.status=="Entregue").length

let dados=[total,entregues]

if(chart) chart.destroy()

chart=new Chart(document.getElementById("grafico"),{

type:"bar",

data:{
labels:["Total","Entregues"],
datasets:[{data:dados}]
}

})

}

window.exportarPDF=function(){

const { jsPDF } = window.jspdf
let docPDF=new jsPDF()

let y=10

movimentacoes.forEach(m=>{

docPDF.text(`${m.patrimonio} ${m.origem} -> ${m.destino}`,10,y)

y+=10

})

docPDF.save("movimentacoes.pdf")

}

</script>

</body>
</html>
