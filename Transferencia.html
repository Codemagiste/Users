<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inventário TI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

header{
background:#0f172a;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

input,select,button{
padding:8px;
margin:4px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#login{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
background:#0f172a;
color:white;
}

#loginBox{
background:#1e293b;
padding:40px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login">

<div id="loginBox">

<h2>Sistema Inventário TI</h2>

<input id="usuario" placeholder="Usuário"><br>
<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

</div>
</div>

<div id="app" style="display:none">

<header>
Inventário TI
<button onclick="logout()" style="float:right">Sair</button>
</header>

<div class="container">

<div class="card">

<h3>Cadastrar Equipamento</h3>

<input id="patrimonio" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="quantidade" type="number" value="1">
<input id="loja" placeholder="Loja">

<select id="status">
<option>Ativo</option>
<option>Estoque</option>
<option>Manutenção</option>
<option>Defeito</option>
</select>

<button onclick="salvarEquipamento()">Salvar</button>

</div>

<div class="card">

<h3>Equipamentos</h3>

<table>

<thead>
<tr>
<th>Patrimônio</th>
<th>Equipamento</th>
<th>Qtd</th>
<th>Loja</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabelaEquip"></tbody>

</table>

</div>

<div class="card">

<h3>Transferência</h3>

<input id="patTransfer" placeholder="Patrimônio">
<input id="destino" placeholder="Destino">
<input id="responsavel" placeholder="Responsável">

<button onclick="transferir()">Transferir</button>

</div>

<div class="card">

<h3>Movimentações</h3>

<table>

<thead>
<tr>
<th>Tipo</th>
<th>Patrimônio</th>
<th>Origem</th>
<th>Destino</th>
<th>Status</th>
<th>Responsável</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaMov"></tbody>

</table>

</div>

<div class="card">

<h3>Dashboard</h3>

<canvas id="grafico"></canvas>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",
authDomain: "romtech-e1e15.firebaseapp.com",
projectId: "romtech-e1e15",
storageBucket: "romtech-e1e15.appspot.com",
messagingSenderId: "153455301031",
appId: "1:153455301031:web:6933f2bc3f6e485c2f2682"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let equipamentos=[]
let movimentacoes=[]
let grafico

const loginDiv = document.getElementById("login")
const appDiv = document.getElementById("app")

function login(){

const user=document.getElementById("usuario").value
const pass=document.getElementById("senha").value

if(user==="admin" && pass==="123"){
loginDiv.style.display="none"
appDiv.style.display="block"

carregarEquipamentos()
carregarMov()

}else{
alert("Usuário ou senha inválido")
}

}

window.login=login

function logout(){
location.reload()
}

window.logout=logout

async function salvarEquipamento(){

const patrimonio=document.getElementById("patrimonio").value
const nome=document.getElementById("nome").value
const quantidade=parseInt(document.getElementById("quantidade").value)
const loja=document.getElementById("loja").value
const status=document.getElementById("status").value

if(!patrimonio || !nome){
alert("Preencha os campos")
return
}

await addDoc(collection(db,"equipamentos"),{
patrimonio,
nome,
quantidade,
loja,
status
})

document.getElementById("patrimonio").value=""
document.getElementById("nome").value=""
document.getElementById("loja").value=""

carregarEquipamentos()

}

window.salvarEquipamento=salvarEquipamento

async function carregarEquipamentos(){

const querySnapshot = await getDocs(collection(db,"equipamentos"))

equipamentos=[]
let html=""

querySnapshot.forEach((docSnap)=>{

const e=docSnap.data()

equipamentos.push({
id:docSnap.id,
...e
})

html+=`
<tr>
<td>${e.patrimonio}</td>
<td>${e.nome}</td>
<td>${e.quantidade}</td>
<td>${e.loja}</td>
<td>${e.status}</td>
</tr>
`

})

document.getElementById("tabelaEquip").innerHTML=html

}

async function transferir(){

const pat=document.getElementById("patTransfer").value
const dest=document.getElementById("destino").value
const resp=document.getElementById("responsavel").value

const eq=equipamentos.find(e=>e.patrimonio==pat)

if(!eq){
alert("Equipamento não encontrado")
return
}

await updateDoc(doc(db,"equipamentos",eq.id),{
loja:dest
})

const mov={
tipo:"Transferência",
patrimonio:eq.patrimonio,
origem:eq.loja,
destino:dest,
status:"Transferido",
responsavel:resp,
data:new Date().toLocaleString()
}

await addDoc(collection(db,"movimentacoes"),mov)

carregarEquipamentos()
carregarMov()

}

window.transferir=transferir

async function carregarMov(){

const querySnapshot = await getDocs(collection(db,"movimentacoes"))

movimentacoes=[]
let html=""

querySnapshot.forEach((doc)=>{

const m=doc.data()

movimentacoes.push(m)

html+=`
<tr>
<td>${m.tipo}</td>
<td>${m.patrimonio}</td>
<td>${m.origem}</td>
<td>${m.destino}</td>
<td>${m.status}</td>
<td>${m.responsavel}</td>
<td>${m.data}</td>
</tr>
`

})

document.getElementById("tabelaMov").innerHTML=html

graficoDashboard()

}

function graficoDashboard(){

if(grafico)grafico.destroy()

grafico=new Chart(
document.getElementById("grafico"),
{
type:"bar",
data:{
labels:["Movimentações"],
datasets:[{
label:"Total",
data:[movimentacoes.length]
}]
}
})

}

</script>

</body>
</html>
