<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventário TI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
header{background:#0f172a;color:#fff;padding:15px;display:flex;justify-content:space-between}
.container{padding:15px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:10px;border:none;background:#2563eb;color:#fff;border-radius:6px}

.badge{padding:4px 8px;border-radius:6px;color:#fff}
.Ativo{background:#16a34a}
.Estoque{background:#64748b}
.Manutenção{background:#f59e0b}
.Defeito{background:#dc2626}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}

@media(max-width:600px){
  table,thead,tbody,tr,td{display:block}
  td{border:none}
}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h2>Login</h2>
    <input id="usuario" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none">
<header>
<h2>Inventário TI</h2>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="card">
<h3>Cadastro</h3>
<input id="patrimonio" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="quantidade" type="number" value="1">
<input id="loja" placeholder="Loja">
<select id="status">
<option>Ativo</option>
<option>Estoque</option>
<option>Manutenção</option>
<option>Defeito</option>
</select>
<button onclick="salvarEquipamento()">Salvar</button>
</div>

<div class="card">
<h3>Busca</h3>
<input id="busca" placeholder="Buscar equipamento" onkeyup="buscar()">
</div>

<div class="card">
<h3>Equipamentos</h3>
<table>
<thead><tr><th>Patrimônio</th><th>Nome</th><th>Status</th><th>Ações</th></tr></thead>
<tbody id="tabelaEquip"></tbody>
</table>
</div>

<div class="card">
<h3>Dashboard</h3>
<canvas id="grafico"></canvas>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig={
 apiKey:"AIzaSyB01Ht6TLmpMc3xhN5euPZo5ecC4RJtfJrJu8-ivBw",
 authDomain:"romtech-e1e15.firebaseapp.com",
 projectId:"romtech-e1e15"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let equipamentos=[];
let grafico;

window.login=async()=>{
 const email=usuario.value;
 const senha=senha.value;
 await signInWithEmailAndPassword(auth,email,senha);
 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";
 carregarEquip();
}

window.logout=()=>{signOut(auth);location.reload();}

window.salvarEquipamento=async()=>{
 await addDoc(collection(db,"equipamentos"),{
  patrimonio:patrimonio.value,
  nome:nome.value,
  quantidade:quantidade.value,
  loja:loja.value,
  status:status.value
 });
 limpar();
 carregarEquip();
}

function limpar(){
 patrimonio.value="";
 nome.value="";
 quantidade.value=1;
 loja.value="";
}

async function carregarEquip(){
 const snap=await getDocs(collection(db,"equipamentos"));
 equipamentos=[];
 let html="";

 snap.forEach(d=>{
  const e=d.data();
  equipamentos.push(e);
 });

 render(equipamentos);
 graficoDash();
}

function render(lista){
 let html="";
 lista.forEach(e=>{
  html+=`<tr>
   <td>${e.patrimonio}</td>
   <td>${e.nome}</td>
   <td><span class="badge ${e.status}">${e.status}</span></td>
   <td>
     <button onclick="imprimir('${e.patrimonio}','${e.nome}')">🖨️</button>
   </td>
  </tr>`;
 });
 tabelaEquip.innerHTML=html;
}

window.buscar=()=>{
 const termo=busca.value.toLowerCase();
 const filtrado=equipamentos.filter(e=>
  e.nome.toLowerCase().includes(termo) ||
  e.patrimonio.toLowerCase().includes(termo)
 );
 render(filtrado);
}

window.imprimir=(pat,nome)=>{
 const w=window.open('','PRINT');
 w.document.write(`
 <div style="font-family:monospace">
 <h3>ROMTECH</h3>
 <p>Patrimônio: ${pat}</p>
 <p>Equipamento: ${nome}</p>
 </div>
 `);
 w.print();
 w.close();
}

function graficoDash(){
 const cont={};
 equipamentos.forEach(e=>{cont[e.status]=(cont[e.status]||0)+1});

 if(grafico)grafico.destroy();
 grafico=new Chart(graficoCanvas(),{
  type:'bar',
  data:{labels:Object.keys(cont),datasets:[{data:Object.values(cont)}]}
 });
}

function graficoCanvas(){
 return document.getElementById("grafico");
}
</script>

</body>
</html>

  match /equipamentos/{id} {

   allow write: if request.auth != null;
  }

  match /usuarios/{id} {
   allow read, write: if request.auth.token.email == "SEU_EMAIL_ADMIN";
  }

 }
