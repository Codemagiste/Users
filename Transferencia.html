<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventário TI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --azul:#2563eb;
  --azul-escuro:#1e3a8a;
  --bg:#f1f5f9;
  --card:#ffffff;
  --texto:#0f172a;
  --sombra:0 10px 25px rgba(0,0,0,.08);
}

*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial;background:linear-gradient(135deg,#e2e8f0,#f8fafc);color:var(--texto)}

#login{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)}
#loginBox{background:#fff;padding:40px;border-radius:16px;box-shadow:var(--sombra);text-align:center;width:320px}

input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #cbd5e1}
button{background:linear-gradient(145deg,var(--azul),var(--azul-escuro));color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer}
button:hover{transform:scale(1.03)}

header{background:#0f172a;color:#fff;padding:16px;display:flex;justify-content:space-between}
.container{padding:20px;max-width:1200px;margin:auto}
.card{background:#fff;padding:20px;margin-bottom:20px;border-radius:14px;box-shadow:var(--sombra)}

.badge{padding:4px 8px;border-radius:6px;color:#fff}
.Ativo{background:#16a34a}
.Estoque{background:#64748b}
.Manutenção{background:#f59e0b}
.Defeito{background:#dc2626}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd}
tr:hover{background:#f8fafc}
</style>
</head>
<body>

<div id="login">
  <div id="loginBox">
    <h2>Inventário TI</h2>
    <input id="usuario" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none">
<header>
<h2>Inventário TI</h2>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="card">
<h3>Cadastro</h3>
<input id="patrimonio" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="quantidade" type="number" value="1">
<input id="loja" placeholder="Loja">
<select id="status">
<option>Ativo</option>
<option>Estoque</option>
<option>Manutenção</option>
<option>Defeito</option>
</select>
<button onclick="salvarEquipamento()">Salvar</button>
</div>

<div class="card">
<h3>Equipamentos</h3>
<table>
<thead><tr><th>Patrimônio</th><th>Nome</th><th>Status</th><th>Ações</th></tr></thead>
<tbody id="tabelaEquip"></tbody>
</table>
</div>

<div class="card" id="usuariosBox" style="display:none">
<h3>Usuários</h3>
<input id="novoEmail" placeholder="Email">
<input id="novoNome" placeholder="Nome">
<select id="novoTipo">
<option value="admin">Admin</option>
<option value="supervisor">Supervisor</option>
<option value="loja">Loja</option>
</select>
<button onclick="criarUsuario()">Criar</button>
<table>
<thead><tr><th>Email</th><th>Tipo</th></tr></thead>
<tbody id="tabelaUsuarios"></tbody>
</table>
</div>

<div class="card">
<h3>Logs</h3>
<table>
<thead><tr><th>Ação</th><th>Usuário</th><th>Data</th></tr></thead>
<tbody id="tabelaLogs"></tbody>
</table>
</div>

<div class="card">
<h3>Dashboard</h3>
<canvas id="grafico"></canvas>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",authDomain:"romtech-e1e15.firebaseapp.com",projectId:"romtech-e1e15"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let tipoUsuario=null;
let equipamentos=[];
let grafico;
let editandoId=null;

window.login=async()=>{
  const email=document.getElementById("usuario").value.trim();
  const senhaInput=document.getElementById("senha").value.trim();

  if(!email||!senhaInput){alert("Preencha tudo");return}

  try{
    await signInWithEmailAndPassword(auth,email,senhaInput);
    const snap=await getDocs(collection(db,"usuarios"));
    snap.forEach(d=>{if(d.data().email===email)tipoUsuario=d.data().tipo});
    iniciar();
  }catch(e){alert("Erro login")}
}

function iniciar(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  if(tipoUsuario==="admin"){
    document.getElementById("usuariosBox").style.display="block";
    carregarUsuarios();
  }

  carregarEquip();
  carregarLogs();
}

window.logout=()=>{signOut(auth);location.reload();}

window.salvarEquipamento=async()=>{
  const data={
    patrimonio:document.getElementById("patrimonio").value,
    nome:document.getElementById("nome").value,
    quantidade:document.getElementById("quantidade").value,
    loja:document.getElementById("loja").value,
    status:document.getElementById("status").value
  };

  if(editandoId){
    await updateDoc(doc(db,"equipamentos",editandoId),data);
    log("Editou",data.patrimonio);
    editandoId=null;
  }else{
    await addDoc(collection(db,"equipamentos"),data);
    log("Criou",data.patrimonio);
  }

  limparCampos();
  carregarEquip();
}

function limparCampos(){
  document.getElementById("patrimonio").value="";
  document.getElementById("nome").value="";
  document.getElementById("quantidade").value=1;
  document.getElementById("loja").value="";
  document.getElementById("status").value="Ativo";
}

async function carregarEquip(){
  const snap=await getDocs(collection(db,"equipamentos"));
  let html="";
  equipamentos=[];

  snap.forEach(d=>{
    const e=d.data();
    e.id=d.id;
    equipamentos.push(e);

    html+=`<tr>
    <td>${e.patrimonio}</td>
    <td>${e.nome}</td>
    <td><span class="badge ${e.status}">${e.status}</span></td>
    <td>
    ${tipoUsuario!=="loja"?`<button title="Editar" onclick="editar('${e.id}')">✏️</button>`:""}
    ${tipoUsuario==="admin"?`<button title="Excluir" onclick="excluir('${e.id}')">🗑️</button>`:""}
    </td>
    </tr>`;
  });

  document.getElementById("tabelaEquip").innerHTML=html;
  graficoDash();
}

window.editar=id=>{
  if(tipoUsuario==="loja")return alert("Sem permissão");
  const e=equipamentos.find(x=>x.id===id);
  document.getElementById("patrimonio").value=e.patrimonio;
  document.getElementById("nome").value=e.nome;
  document.getElementById("quantidade").value=e.quantidade;
  document.getElementById("loja").value=e.loja;
  document.getElementById("status").value=e.status;
  editandoId=id;
}

window.excluir=async(id)=>{
  if(tipoUsuario!=="admin")return alert("Sem permissão");
  await deleteDoc(doc(db,"equipamentos",id));
  log("Excluiu",id);
  carregarEquip();
}

window.criarUsuario=async()=>{
  await addDoc(collection(db,"usuarios"),{
    email:document.getElementById("novoEmail").value,
    nome:document.getElementById("novoNome").value,
    tipo:document.getElementById("novoTipo").value
  });
  carregarUsuarios();
}

async function carregarUsuarios(){
  const snap=await getDocs(collection(db,"usuarios"));
  let html="";
  snap.forEach(d=>{
    const u=d.data();
    html+=`<tr><td>${u.email}</td><td>${u.tipo}</td></tr>`;
  });
  document.getElementById("tabelaUsuarios").innerHTML=html;
}

async function log(acao,det){
  await addDoc(collection(db,"logs"),{
    acao,
    det,
    usuario:auth.currentUser.email,
    data:new Date().toLocaleString()
  });
}

async function carregarLogs(){
  const snap=await getDocs(collection(db,"logs"));
  let html="";
  snap.forEach(d=>{
    const l=d.data();
    html+=`<tr><td>${l.acao}</td><td>${l.usuario}</td><td>${l.data}</td></tr>`;
  });
  document.getElementById("tabelaLogs").innerHTML=html;
}

function graficoDash(){
  const cont={};
  equipamentos.forEach(e=>{cont[e.status]=(cont[e.status]||0)+1});

  if(grafico)grafico.destroy();
  grafico=new Chart(document.getElementById("grafico"),{
    type:'bar',
    data:{labels:Object.keys(cont),datasets:[{label:'Equipamentos',data:Object.values(cont)}]}
  });
}
</script>

</body>
</html>
