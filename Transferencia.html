<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventário TI</title>

<link rel="icon" href="https://i.imgur.com/u7X1g64.jpeg">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f1f5f9}

/* LOGIN */
#login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
#loginBox{
background:#fff;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2)
}
#loginBox input{
width:100%;
padding:10px;
margin:8px 0;
}
#loginBox button{
width:100%;
padding:10px;
background:#16a34a;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* APP */
header{
background:#0f172a;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.container{padding:20px}
.card{
background:#fff;
padding:15px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,.1)
}
input,select{
padding:8px;
margin:5px;
}
button{
padding:8px 12px;
background:#16a34a;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}
th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}
footer{
text-align:center;
padding:15px;
color:#666;
font-size:13px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div id="loginBox">
<h2>Sistema Inventário TI</h2>
<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
<span>Inventário TI</span>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="card">
<h3>Cadastrar Equipamento</h3>
<input id="patrimonio" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="quantidade" type="number" value="1">
<input id="loja" placeholder="Loja">
<select id="status">
<option value="Ativo">Ativo</option>
<option value="Estoque">Estoque</option>
<option value="Manutenção">Manutenção</option>
<option value="Defeito">Defeito</option>
</select>
<button id="btnSalvar">Salvar</button>
</div>

<div class="card">
<h3>Equipamentos</h3>
<table>
<thead>
<tr>
<th>Patrimônio</th>
<th>Equipamento</th>
<th>Qtd</th>
<th>Loja</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaEquip"></tbody>
</table>
</div>

<div class="card">
<h3>Movimentações</h3>
<table>
<thead>
<tr>
<th>Tipo</th>
<th>Patrimônio</th>
<th>Origem</th>
<th>Destino</th>
<th>Status</th>
<th>Responsável</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tabelaMov"></tbody>
</table>
</div>

</div>

<footer>Desenvolvido por RomTech • Uso exclusivo</footer>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyB01Ht6TLmpMc3xhN5euPZo5ecC4RJtfJrJu8-ivBw",
authDomain:"romtech-e1e15.firebaseapp.com",
projectId:"romtech-e1e15",
storageBucket:"romtech-e1e15.firebasestorage.app",
messagingSenderId:"153455301031",
appId:"1:153455301031:web:6933f2bc3f6e485c2f2682"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let equipamentos=[];

// LOGIN
window.login=function(){
const user=document.getElementById("usuario").value.trim();
const pass=document.getElementById("senha").value.trim();
if(!user||!pass){alert("Informe usuário e senha");return;}
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
carregarEquipamentos();
}

// LOGOUT
window.logout=function(){location.reload()}

// SALVAR
document.getElementById("btnSalvar").onclick=async()=>{
const patrimonio=patrimonio.value.trim();
const nome=nome.value.trim();
const quantidade=parseInt(quantidade.value)||0;
const loja=loja.value.trim();
const status=status.value||"Ativo";

if(!patrimonio||!nome||!loja){alert("Preencha os campos");return;}

await addDoc(collection(db,"equipamentos"),{patrimonio,nome,quantidade,loja,status});
alert("Salvo!");
carregarEquipamentos();
}

// CARREGAR
async function carregarEquipamentos(){
const qs=await getDocs(collection(db,"equipamentos"));
let html="";
qs.forEach(doc=>{
const e=doc.data();
html+=`<tr><td>${e.patrimonio}</td><td>${e.nome}</td><td>${e.quantidade}</td><td>${e.loja}</td><td>${e.status}</td></tr>`;
});
tabelaEquip.innerHTML=html;
}
</script>

</body>
</html>
