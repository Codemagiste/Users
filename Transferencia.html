<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inventário TI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
header{background:#0f172a;color:#fff;padding:15px;font-size:20px}
.container{padding:20px}
input,select,button{padding:8px;margin:4px}
button{background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer}
button:hover{background:#1d4ed8}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
#login{display:flex;height:100vh;align-items:center;justify-content:center;background:#0f172a;color:#fff}
#loginBox{background:#1e293b;padding:40px;border-radius:10px;text-align:center}
.logo{width:220px;margin-bottom:20px}
</style>
</head>

<body>

<div id="login">
<div id="loginBox">
<img src="https://i.imgur.com/u7X1g64.jpeg" class="logo">
<h2>Sistema Inventário TI</h2>
<input id="usuario" placeholder="Usuário"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app" style="display:none">
<header>
Inventário TI
<button onclick="logout()" style="float:right">Sair</button>
</header>

<div class="container">

<div class="card">
<h3>Cadastrar Equipamento</h3>
<input id="patrimonio" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="quantidade" type="number" value="1">
<input id="loja" placeholder="Loja">
<select id="status">
<option value="Ativo">Ativo</option>
<option value="Estoque">Estoque</option>
<option value="Manutenção">Manutenção</option>
<option value="Defeito">Defeito</option>
</select>
<button onclick="salvarEquipamento()">Salvar</button>
</div>

<div class="card">
<h3>Equipamentos</h3>
<table>
<thead>
<tr>
<th>Patrimônio</th><th>Equipamento</th><th>Qtd</th><th>Loja</th><th>Status</th>
</tr>
</thead>
<tbody id="tabelaEquip"></tbody>
</table>
</div>

<div class="card">
<h3>Movimentações</h3>
<table>
<thead>
<tr>
<th>Tipo</th><th>Patrimônio</th><th>Origem</th><th>Destino</th><th>Status</th><th>Responsável</th><th>Data</th>
</tr>
</thead>
<tbody id="tabelaMov"></tbody>
</table>
</div>

<div class="card">
<h3>Dashboard</h3>
<canvas id="grafico"></canvas>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",
authDomain: "romtech-e1e15.firebaseapp.com",
projectId: "romtech-e1e15",
storageBucket: "romtech-e1e15.firebasestorage.app",
messagingSenderId: "153455301031",
appId: "1:153455301031:web:6933f2bc3f6e485c2f2682"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let equipamentos=[]
let movimentacoes=[]
let grafico

const loginDiv=document.getElementById("login")
const appDiv=document.getElementById("app")

window.login=function(){
const u=document.getElementById("usuario").value.trim()
const s=document.getElementById("senha").value.trim()
if(!u||!s){alert("Informe usuário e senha");return}
loginDiv.style.display="none"
appDiv.style.display="block"
carregarEquipamentos()
carregarMov()
}

window.logout=function(){location.reload()}

// SALVAR EQUIPAMENTO (CORRIGIDO)
window.salvarEquipamento=async function(){

const patrimonioInput=document.getElementById("patrimonio")
const nomeInput=document.getElementById("nome")
const qtdInput=document.getElementById("quantidade")
const lojaInput=document.getElementById("loja")
const statusInput=document.getElementById("status")

const patrimonio=patrimonioInput.value.trim()
const nome=nomeInput.value.trim()
const quantidade=parseInt(qtdInput.value)||0
const loja=lojaInput.value.trim()
const status=statusInput.value||"Ativo"

if(!patrimonio||!nome||!loja){alert("Preencha os campos");return}

await addDoc(collection(db,"equipamentos"),{patrimonio,nome,quantidade,loja,status})

alert("Salvo com sucesso!")

patrimonioInput.value=""
nomeInput.value=""
qtdInput.value=1
lojaInput.value=""
statusInput.value="Ativo"

carregarEquipamentos()
}

// CARREGAR EQUIPAMENTOS
async function carregarEquipamentos(){
const snap=await getDocs(collection(db,"equipamentos"))
equipamentos=[]
let html=""
snap.forEach(doc=>{
const e=doc.data()
equipamentos.push(e)
html+=`<tr><td>${e.patrimonio}</td><td>${e.nome}</td><td>${e.quantidade}</td><td>${e.loja}</td><td>${e.status}</td></tr>`
})
document.getElementById("tabelaEquip").innerHTML=html
}

// CARREGAR MOVIMENTAÇÕES
async function carregarMov(){
const snap=await getDocs(collection(db,"movimentacoes"))
movimentacoes=[]
let html=""
snap.forEach(doc=>{
const m=doc.data()
movimentacoes.push(m)
html+=`<tr><td>${m.tipo}</td><td>${m.patrimonio}</td><td>${m.origem}</td><td>${m.destino}</td><td>${m.status}</td><td>${m.responsavel}</td><td>${m.data}</td></tr>`
})
document.getElementById("tabelaMov").innerHTML=html
graficoDashboard()
}

function graficoDashboard(){
if(grafico)grafico.destroy()
grafico=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{labels:["Movimentações"],datasets:[{label:"Total",data:[movimentacoes.length]}]}
})
}
</script>

</body>
</html>
