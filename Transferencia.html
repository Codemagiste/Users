<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Transferência TI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

header{
background:#0f172a;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,button{
padding:8px;
margin:5px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

#login{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
background:#0f172a;
color:white;
}

#loginBox{
background:#1e293b;
padding:40px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="login">

<div id="loginBox">

<h2>Sistema Transferência</h2>

<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

</div>
</div>

<div id="app" style="display:none">

<header>

Sistema Transferência TI

<button onclick="logout()" style="float:right">Sair</button>

</header>

<div class="container">

<div id="cardCadastro" class="card">

<h3>Cadastrar Equipamento</h3>

<input id="patrimonio" placeholder="Patrimônio">
<input id="nome" placeholder="Equipamento">
<input id="loja" placeholder="Loja">

<button onclick="salvarEquipamento()">Salvar</button>

</div>

<div id="cardTransferencia" class="card">

<h3>Transferência</h3>

<input id="patTransfer" placeholder="Patrimônio">
<input id="destino" placeholder="Loja destino">
<input id="responsavel" placeholder="Responsável envio">

<button onclick="transferir()">Transferir</button>

</div>

<div id="cardMov" class="card">

<h3>Movimentações</h3>

<table>

<thead>
<tr>
<th>Tipo</th>
<th>Patrimônio</th>
<th>Destino</th>
<th>Status</th>
<th>Responsável</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",
authDomain: "romtech-e1e15.firebaseapp.com",
projectId: "romtech-e1e15",
storageBucket: "romtech-e1e15.firebasestorage.app",
messagingSenderId: "153455301031",
appId: "1:153455301031:web:6933f2bc3f6e485c2f2682",
measurementId: "G-1DBYYTTXM4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let perfil="";

const loginDiv=document.getElementById("login");
const appDiv=document.getElementById("app");

async function login(){

const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

try{

await signInWithEmailAndPassword(auth,email,senha);

}catch(error){

alert(error.message);

}

}

window.login=login;

function logout(){

signOut(auth);

}

window.logout=logout;

onAuthStateChanged(auth,(user)=>{

if(user){

loginDiv.style.display="none";
appDiv.style.display="block";

const email=user.email;

if(email==="admin@ultra.com"){
perfil="admin";
mostrarAdmin();
}

if(email==="loja@ultra.com"){
perfil="loja";
mostrarLoja();
}

if(email==="acesso@ultra.com"){
perfil="acesso";
mostrarAcesso();
}

carregarMov();

}else{

loginDiv.style.display="flex";
appDiv.style.display="none";

}

});

function mostrarAdmin(){

document.getElementById("cardCadastro").style.display="block";
document.getElementById("cardTransferencia").style.display="block";
document.getElementById("cardMov").style.display="block";

}

function mostrarLoja(){

document.getElementById("cardCadastro").style.display="none";
document.getElementById("cardTransferencia").style.display="block";
document.getElementById("cardMov").style.display="none";

}

function mostrarAcesso(){

document.getElementById("cardCadastro").style.display="none";
document.getElementById("cardTransferencia").style.display="none";
document.getElementById("cardMov").style.display="block";

}

async function salvarEquipamento(){

const patrimonio=document.getElementById("patrimonio").value;
const nome=document.getElementById("nome").value;
const loja=document.getElementById("loja").value;

await addDoc(collection(db,"equipamentos"),{

patrimonio,
nome,
loja

});

alert("Equipamento cadastrado");

}

window.salvarEquipamento=salvarEquipamento;

async function transferir(){

const pat=document.getElementById("patTransfer").value;
const destino=document.getElementById("destino").value;
const resp=document.getElementById("responsavel").value;

await addDoc(collection(db,"movimentacoes"),{

tipo:"Transferência",
patrimonio:pat,
destino:destino,
status:"Enviado",
responsavel:resp,
data:new Date().toLocaleString()

});

carregarMov();

}

window.transferir=transferir;

async function carregarMov(){

const querySnapshot=await getDocs(collection(db,"movimentacoes"));

let html="";

querySnapshot.forEach((doc)=>{

const m=doc.data();

html+=`

<tr>

<td>${m.tipo}</td>
<td>${m.patrimonio}</td>
<td>${m.destino}</td>
<td>${m.status}</td>
<td>${m.responsavel}</td>
<td>${m.data}</td>

<td>
<button onclick="confirmar('${m.patrimonio}')">
Recebido
</button>
</td>

</tr>

`;

});

document.getElementById("tabela").innerHTML=html;

}

async function confirmar(pat){

const nome=prompt("Nome de quem recebeu");
const loja=prompt("Número da loja");

await addDoc(collection(db,"movimentacoes"),{

tipo:"Recebimento",
patrimonio:pat,
destino:loja,
status:"Recebido",
responsavel:nome,
data:new Date().toLocaleString()

});

carregarMov();

}

window.confirmar=confirmar;

</script>

</body>
</html>
