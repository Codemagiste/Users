<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta http-equiv="Content-Security-Policy"
content="default-src * 'self' data: blob: 'unsafe-inline' 'unsafe-eval'">

<title>Enviar Equipamento para Transferir</title>

<link rel="icon"
href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
max-width:500px;
margin:auto;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#cupom{
display:none;
margin-top:30px;
border-top:1px dashed #000;
padding-top:20px;
text-align:center;
width:280px;
margin:auto;
}

/* IMPRESSÃO */

@media print{

body *{
visibility:hidden;
}

#cupom, #cupom *{
visibility:visible;
}

#cupom{
position:absolute;
left:0;
top:0;
width:280px;
margin:auto;
}

}

</style>
<footer style="text-align: center; padding: 10px 0; position: fixed; bottom: 0; width: 100%; background-color: #fff;">
  Desenvolvido por <strong style="color:#0f172a">RomTech</strong> • Uso exclusivo
</footer>

</head>

<body>

<div class="card">

<h2>Enviar Equipamento para Transferir</h2>

<input id="patTransfer" placeholder="Número do Patrimônio">
<input id="destino" placeholder="Loja destino">
<input id="responsavel" placeholder="Responsável pelo envio">

<button onclick="transferir()">Transferir</button>

<div id="cupom">

<h2>Comprovante de Transferência</h2>
<h4>Escaneie o QR Code para validar sua transferência.</h4>
<div id="dadosCupom"></div>

<br>

<canvas id="qrcode"></canvas>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",
authDomain:"romtech-e1e15.firebaseapp.com",
projectId:"romtech-e1e15",
storageBucket:"romtech-e1e15.appspot.com",
messagingSenderId:"153455301031",
appId:"1:153455301031:web:6933f2bc3f6e485c2f2682"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let equipamentos=[];

/* CARREGAR EQUIPAMENTOS */

async function carregarEquipamentos(){

equipamentos=[];

const querySnapshot = await getDocs(collection(db,"equipamentos"));

querySnapshot.forEach((docSnap)=>{

const e = docSnap.data();

equipamentos.push({
id:docSnap.id,
patrimonio:e.patrimonio,
loja:e.loja,
quantidade:Number(e.quantidade || 0)
});

});

}

carregarEquipamentos();

/* TRANSFERIR */

async function transferir(){

try{

const pat = document.getElementById("patTransfer").value.trim();
const destino = document.getElementById("destino").value.trim();
const responsavel = document.getElementById("responsavel").value.trim();

if(!pat || !destino || !responsavel){

alert("Preencha todos os campos.");
return;

}

const eq = equipamentos.find(e => e.patrimonio === pat);

if(!eq){

alert("Equipamento não encontrado.");
return;

}

if(eq.quantidade <= 0){

alert("Estoque zerado. Não é possível transferir.");
return;

}

/* DIMINUIR ESTOQUE */

const novaQtd = eq.quantidade - 1;

await updateDoc(
doc(db,"equipamentos",eq.id),
{
quantidade:novaQtd
}
);

/* DATA */

const data = new Date().toLocaleString();

/* REGISTRAR MOVIMENTAÇÃO */

const docRef = await addDoc(
collection(db,"movimentacoes"),
{
tipo:"Transferência",
patrimonio:eq.patrimonio,
origem:eq.loja,
destino:destino,
status:"Em transporte",
responsavel:responsavel,
data:data
}
);

/* GERAR CUPOM */

document.getElementById("cupom").style.display="block";

document.getElementById("dadosCupom").innerHTML = `
Patrimônio: ${eq.patrimonio}<br>
Origem: ${eq.loja}<br>
Destino: ${destino}<br>
Responsável envio: ${responsavel}<br>
Data: ${data}
`;

/* GERAR QR */

const id = docRef.id;

const urlConfirmacao =
"https://codemagiste.github.io/Users/confirmacao.html?id=" + id;

QRCode.toCanvas(
document.getElementById("qrcode"),
urlConfirmacao
);

/* LIMPAR CAMPOS */

document.getElementById("patTransfer").value="";
document.getElementById("destino").value="";
document.getElementById("responsavel").value="";

/* IMPRIMIR */

setTimeout(()=>{

window.print();

},700);

/* ATUALIZAR LISTA */

carregarEquipamentos();

}catch(e){

console.error("Erro transferência:",e);

alert("Erro ao realizar transferência. Veja o console.");

}

}

window.transferir = transferir;

</script>

</body>
</html>
