<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta http-equiv="Content-Security-Policy"
content="default-src * 'self' data: blob: 'unsafe-inline' 'unsafe-eval'">

<title>Confirmar Recebimento</title>

<link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
width:360px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#16a34a;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

#sucesso{
display:none;
margin-top:20px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>Confirmar Recebimento</h2>

<input id="recebedor" placeholder="Quem está recebendo">
<input id="loja" placeholder="Loja de recebimento">

<button onclick="confirmar()">Confirmar Recebimento</button>

<div id="sucesso">
✔ Transferência confirmada com sucesso
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB01HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8-ivBw",
authDomain:"romtech-e1e15.firebaseapp.com",
projectId:"romtech-e1e15",
storageBucket:"romtech-e1e15.firebasestorage.app",
messagingSenderId:"153455301031",
appId:"1:153455301031:web:6933f2bc3f6e485c2f2682"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* PEGAR ID DA URL */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* CONFIRMAR RECEBIMENTO */

async function confirmar(){

const recebedor = document.getElementById("recebedor").value;
const loja = document.getElementById("loja").value;

if(!recebedor || !loja){

alert("Preencha todos os campos");
return;

}

try{

await updateDoc(
doc(db,"movimentacoes",id),
{
status:"Concluído",
recebedor:recebedor,
lojaRecebimento:loja,
dataRecebimento:new Date().toLocaleString()
}
);

document.getElementById("sucesso").style.display="block";

}catch(e){

console.error(e);
alert("Erro ao confirmar transferência");

}

}

window.confirmar = confirmar;

</script>

</body>
</html>
