<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:#0f172a;padding:20px;}
.header{background:#020617;color:#fff;padding:15px;border-radius:10px;display:flex;justify-content:space-between;}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:15px;}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:6px 10px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
td{padding:8px;border-bottom:1px solid #ddd;}
.badge{padding:4px 10px;border-radius:12px;color:#fff;cursor:pointer;font-size:12px}
.andamento{background:#f59e0b}
.finalizada{background:#2563eb}
.entregue{background:#16a34a}
.login{max-width:300px;margin:auto;margin-top:10%;background:#fff;padding:20px;border-radius:10px;text-align:center}
.login img{width:100%;border-radius:8px;margin-bottom:10px}
.toast{position:fixed;top:10px;right:10px;background:#111;color:#fff;padding:10px;border-radius:6px;opacity:0}
.toast.show{opacity:1}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div id="loginDiv" class="login">
<img src="https://i.imgur.com/u7X1g64.jpeg">
<h2>Sistema OS</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="mainDiv" style="display:none;">
<div class="header">
<span id="userInfo"></span>
<button onclick="logout()">Sair</button>
</div>

<div class="card">
<input id="cliente" placeholder="Cliente">
<input id="equipamento" placeholder="Equipamento">
<input id="tecnico" placeholder="Técnico">
<input id="serie" placeholder="Número de Série">
<input id="defeito" placeholder="Descrição do defeito">

<select id="status">
<option value="">Status</option>
<option>Em andamento</option>
<option>Finalizada</option>
<option>Entregue</option>
</select>

<button onclick="salvar()">Salvar OS</button>
</div>

<div class="card">
<input id="busca" placeholder="Buscar...">
<table>
<thead>
<tr><td>OS</td><td>Cliente</td><td>Equipamento</td><td>Status</td><td>Ações</td></tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

<div id="adminPanel" class="card" style="display:none;">
<h3>Painel Administrativo</h3>
<input id="novoEmail" placeholder="Email">
<input id="novaSenha" type="password" placeholder="Senha">
<select id="novoPerfil">
<option value="tecnico">Técnico</option>
<option value="admin">Admin</option>
</select>
<button onclick="criarUsuario()">Criar Usuário</button>
<pre id="logRelatorio"></pre>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, where, runTransaction } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyAnZR2c7R7ANwHITxawvMgjLD08OrNfHxE",
 authDomain:"manutencaoromtech-ac05f.firebaseapp.com",
 projectId:"manutencaoromtech-ac05f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ordens = collection(db,"ordens");
const usuarios = collection(db,"usuarios");

let usuarioAtual = null;
let cache = [];

function toast(msg){
 const t=document.getElementById('toast');
 t.textContent=msg;
 t.classList.add('show');
 setTimeout(()=>t.classList.remove('show'),3000);
}

async function gerarOS(){
 const ref = doc(db,"config","contadorOS");
 return await runTransaction(db, async (transaction)=>{
   const snap = await transaction.get(ref);
   let seq = 1;
   if(snap.exists()) seq = snap.data().sequencia + 1;
   transaction.set(ref,{sequencia:seq});
   return "OS-" + String(seq).padStart(5,'0');
 });
}

onAuthStateChanged(auth, async user=>{
 if(user){
  loginDiv.style.display="none";
  mainDiv.style.display="block";

  const q = query(usuarios, where("email","==", user.email));
  const snap = await getDocs(q);

  usuarioAtual = !snap.empty ? snap.docs[0].data() : {email:user.email,perfil:"tecnico"};

  userInfo.textContent = user.email + " (" + usuarioAtual.perfil + ")";

  document.getElementById('adminPanel').style.display = usuarioAtual.perfil === 'admin' ? 'block' : 'none';

  carregar();
 } else {
  loginDiv.style.display="block";
  mainDiv.style.display="none";
 }
});

window.login = ()=> signInWithEmailAndPassword(auth,email.value,senha.value).catch(e=>toast(e.message));
window.logout = ()=> signOut(auth);

window.salvar = async ()=>{
 if(!cliente.value||!equipamento.value||!tecnico.value||!serie.value){
  toast("Preencha todos os campos");return;
 }

 const numeroOS = await gerarOS();

 await addDoc(ordens,{
  os: numeroOS,
  cliente:cliente.value,
  equipamento:equipamento.value,
  tecnico:tecnico.value,
  serie:serie.value,
  defeito: defeito.value,
  status: document.getElementById('status').value || "Em andamento",
  data:new Date().toLocaleString(),
  historico:[]
 });

 toast("OS criada: " + numeroOS);
 carregar();
}

async function carregar(){
 cache=[];
 const snap = await getDocs(ordens);
 snap.forEach(d=>{const x=d.data();x.id=d.id;cache.push(x)});
 render(cache);
}

function cor(s){
 if(s==="Em andamento") return "andamento";
 if(s==="Finalizada") return "finalizada";
 if(s==="Entregue") return "entregue";
}

function prox(s){
 if(s==="Em andamento") return "Finalizada";
 if(s==="Finalizada") return "Entregue";
 return "Em andamento";
}

function render(lista){
 tabela.innerHTML="";
 lista.forEach(d=>{
  tabela.innerHTML += `
  <tr>
   <td>${d.os || '-'}</td>
   <td>${d.cliente}</td>
   <td>${d.equipamento}</td>
   <td>
     <span class="badge ${cor(d.status)}" onclick="trocar('${d.id}','${d.status}')">
       ${d.status}
     </span>
   </td>
   <td>
     <button title="Ver histórico" onclick="hist('${d.id}')">📜</button>
     <button title="Imprimir OS" onclick="imprimir('${d.id}')">🧾</button>
     ${usuarioAtual && usuarioAtual.perfil === "admin" ? `<button title="Excluir OS" onclick="del('${d.id}')">🗑</button>` : ""}
   </td>
  </tr>
  `;
 });
}

busca.oninput = ()=>{
 const t=busca.value.toLowerCase();
 render(cache.filter(d=>d.cliente.toLowerCase().includes(t) || d.equipamento.toLowerCase().includes(t)));
}

window.trocar = async (id,atual)=>{
 const novo = prox(atual);
 const ref = doc(db,"ordens",id);
 const snap = await getDoc(ref);
 const d = snap.data();

 const hist = d.historico || [];
 hist.push({de:atual,para:novo,data:new Date().toLocaleString(),user:usuarioAtual.email});

 await updateDoc(ref,{status:novo,historico:hist});
 carregar();
}

window.hist = async id=>{
 const snap = await getDoc(doc(db,"ordens",id));
 const h = snap.data().historico || [];
 let txt="Histórico:\n";
 h.forEach(x=> txt += `${x.data} - ${x.de} → ${x.para} (${x.user})\n`);
 alert(txt);
}

window.imprimir = async id=>{
 const snap = await getDoc(doc(db,'ordens',id));
 const d = snap.data();

 const w = window.open('', '', 'width=300,height=600');
 w.document.write(`
  <style>
    body{font-family:monospace;font-size:12px}
  </style>
  <h3>ORDEM DE SERVIÇO</h3>
  OS: ${d.os}<br>
  Cliente: ${d.cliente}<br>
  Equip: ${d.equipamento}<br>
  Defeito: ${d.defeito || '-'}<br>
  Status: ${d.status}<br>
  Técnico: ${d.tecnico}<br>
  ${d.data}
 `);
 w.print();
}

window.del = async id=>{
 if(usuarioAtual.perfil !== "admin") return toast("Sem permissão");
 await deleteDoc(doc(db,"ordens",id));
 carregar();
}

window.criarUsuario = async ()=>{
 try{
  const email = document.getElementById('novoEmail').value;
  const senha = document.getElementById('novaSenha').value;
  const perfil = document.getElementById('novoPerfil').value;

  const cred = await createUserWithEmailAndPassword(auth,email,senha);

  await addDoc(usuarios,{email: email, perfil: perfil});

  toast('Usuário criado');
  await signOut(auth);

 }catch(e){toast(e.message)}
}

</script>
</body>
</html>
