<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Manutenção</title>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnZR2c7R7ANwHITxawvMgjLD08OrNfHxE",
  authDomain: "manutencaoromtech-ac05f.firebaseapp.com",
  projectId: "manutencaoromtech-ac05f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const ordensCollection = collection(db,"ordens");

// Correção de ccontaddor que estava usando sempre o mesmo ID
let contadorOS = Number(localStorage.getItem("contadorOS")) || 0;
function gerarNumeroOS(){
  contadorOS++;
  localStorage.setItem("contadorOS", contadorOS);
  return new Date().getFullYear()+"-"+String(contadorOS).padStart(4,"0");
}

function logout(){
  signOut(auth).then(()=>{
    location.reload();
  });
}

// Vai salvar automaticamente
document.getElementById("formEquipamento")?.addEventListener("submit",async function(e){
  e.preventDefault();

  const dados={
    os: gerarNumeroOS(),
    data: new Date().toLocaleString(),
    cliente: document.getElementById("cliente").value,
    equipamento: document.getElementById("equipamento").value,
    tecnico: document.getElementById("tecnico").value,
    status: document.getElementById("status").value
  };

  await addDoc(ordensCollection,dados);
  this.reset();
  renderTabela();
});

// TABELA
async function renderTabela(){
  const tbody=document.querySelector("#tabela tbody");
  if(!tbody) return;
  tbody.innerHTML="";

  const querySnapshot = await getDocs(ordensCollection);

  querySnapshot.forEach(docSnap=>{
    const d=docSnap.data();
    const id=docSnap.id;

    const linha=tbody.insertRow();
    linha.insertCell().textContent=d.os;
    linha.insertCell().textContent=d.cliente;
    linha.insertCell().textContent=d.equipamento;
    linha.insertCell().textContent=d.tecnico;
    linha.insertCell().textContent=d.status;

    const acao=linha.insertCell();
    acao.innerHTML=`
      <button onclick='editarOS("${id}")'>✏️</button>
      <button onclick='gerarComprovante("${id}")'>🖨</button>
      <button onclick='excluirOS("${id}")'>🗑</button>
    `;
  });
}

// Fun Editar
async function editarOS(id){
  const docRef = doc(db,"ordens",id);
  const docSnap = await getDoc(docRef);

  if(!docSnap.exists()) return;

  const d = docSnap.data();

  const novoCliente = prompt("Cliente:", d.cliente);
  const novoEquip = prompt("Equipamento:", d.equipamento);
  const novoTec = prompt("Técnico:", d.tecnico);

  await updateDoc(docRef,{
    cliente: novoCliente,
    equipamento: novoEquip,
    tecnico: novoTec
  });

  renderTabela();
}

// EXCLUIR
async function excluirOS(id){
  if(confirm("Excluir?")){
    await deleteDoc(doc(db,"ordens",id));
    renderTabela();
  }
}

// Comprovante impressao modelo Bematech
async function gerarComprovante(id){
  const docRef = doc(db,"ordens",id);
  const docSnap = await getDoc(docRef);

  if(!docSnap.exists()) return;

  const d = docSnap.data();

  const w = window.open("","_blank","width=400,height=600");
  w.document.write(`
    <h2>OS ${d.os}</h2>
    <p>Cliente: ${d.cliente}</p>
    <p>Equipamento: ${d.equipamento}</p>
    <p>Técnico: ${d.tecnico}</p>
    <p>Status: ${d.status}</p>
    <hr>
    Assinatura: __________________
  `);
  w.print();
}

window.logout = logout;
window.editarOS = editarOS;
window.excluirOS = excluirOS;
window.gerarComprovante = gerarComprovante;

</script>

</body>
</html>
