<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Manutenção</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{background:linear-gradient(135deg,#0f172a,#1e293b);padding:30px;color:#1e293b;}
.header{background:#0f172a;color:white;padding:25px;border-radius:12px;margin-bottom:25px;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.card{background:white;padding:25px;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.08);margin-bottom:25px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
input,select,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;}
textarea{margin-top:15px;}
button{background:#2563eb;color:white;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;margin-top:15px;font-weight:bold;transition:0.2s;}
button:hover{transform:scale(1.05);}
.btn-green{background:#16a34a;}
.btn-red{background:#dc2626;}
.btn-gray{background:#475569;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#0f172a;color:white;padding:14px;text-align:left;}
td{padding:12px;border-bottom:1px solid #eee;font-size:14px;}
.actions button{margin-right:5px;padding:8px 12px;font-size:12px;}
.status{padding:6px 10px;border-radius:20px;font-size:12px;font-weight:bold;color:white;text-align:center;}
.em-andamento{background:#f59e0b;}
.finalizada{background:#2563eb;}
.entregue{background:#16a34a;}
</style>
</head>

<body>

<div class="header">
<h1>📦 Sistema de Entrada de Equipamentos</h1>
</div>

<div class="card">
<form id="formEquipamento">
<div class="form-grid">
<input type="text" id="loja" placeholder="Loja de Entrada" required>
<input type="text" id="setor" placeholder="Setor de Recebimento" required>
<input type="text" id="ticket" placeholder="Ticket Milvus" required>
<input type="text" id="tecnico" placeholder="Técnico Responsável" required>
<input type="text" id="cliente" placeholder="Nome do Cliente" required>
<input type="text" id="equipamento" placeholder="Equipamento" required>
<input type="text" id="modelo" placeholder="Marca / Modelo">
<input type="text" id="serie" placeholder="Número de Série">
<select id="status" required>
<option value="">Status da OS</option>
<option value="Em andamento">Em andamento</option>
<option value="Finalizada">Finalizada</option>
<option value="Entregue">Entregue</option>
</select>
</div>
<textarea id="defeito" placeholder="Defeito informado"></textarea>
<button type="submit">📄 Registrar e Gerar OS</button>
</form>
</div>

<div class="card">
<h2>Ordens de Serviço</h2>
<table id="tabela">
<thead>
<tr>
<th>OS</th>
<th>Data</th>
<th>Cliente</th>
<th>Equipamento</th>
<th>Técnico</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<button class="btn-gray" onclick="voltar()">⬅ Voltar ao Início</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5wjNolrTWjDRp8qEqz-gPqplPw3RIzMQ",
  authDomain: "manutencaoromtech.firebaseapp.com",
  projectId: "manutencaoromtech",
  storageBucket: "manutencaoromtech.firebasestorage.app",
  messagingSenderId: "148127002919",
  appId: "1:148127002919:web:166c7e0e0252e7d4c47902",
  measurementId: "G-Y2CZZC0B2G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let contadorOS = 0;

function gerarNumeroOS(){
contadorOS++;
return new Date().getFullYear() + "-" + String(contadorOS).padStart(4,"0");
}

async function carregarOS(){
const querySnapshot = await getDocs(collection(db, "ordens_servico"));
const tbody=document.querySelector("#tabela tbody");
tbody.innerHTML="";

querySnapshot.forEach((docSnap)=>{
const d = docSnap.data();
const id = docSnap.id;

const linha=tbody.insertRow();
linha.insertCell().textContent=d.os;
linha.insertCell().textContent=new Date(d.data.seconds*1000).toLocaleString();
linha.insertCell().textContent=d.cliente;
linha.insertCell().textContent=d.equipamento;
linha.insertCell().textContent=d.tecnico;

let classeStatus="";
if(d.status==="Em andamento") classeStatus="em-andamento";
if(d.status==="Finalizada") classeStatus="finalizada";
if(d.status==="Entregue") classeStatus="entregue";

linha.insertCell().innerHTML=`<span class="status ${classeStatus}">${d.status}</span>`;

const acao=linha.insertCell();
acao.classList.add("actions");
acao.innerHTML=`
<button class="btn-green" onclick='imprimir(${JSON.stringify(d).replace(/"/g,'&quot;')})'>🖨</button>
<button class="btn-gray" onclick="alterarStatus('${id}')">🔄</button>
<button class="btn-red" onclick="excluirOS('${id}')">🗑</button>
`;
});
}

document.getElementById("formEquipamento").addEventListener("submit", async function(e){
e.preventDefault();

const dados={
os:gerarNumeroOS(),
data:new Date(),
loja:loja.value,
setor:setor.value,
ticket:ticket.value,
tecnico:tecnico.value,
cliente:cliente.value,
equipamento:equipamento.value,
modelo:modelo.value,
serie:serie.value,
defeito:defeito.value,
status:status.value
};

await addDoc(collection(db, "ordens_servico"), dados);
alert("✅ OS registrada com sucesso!");
this.reset();
carregarOS();
});

window.excluirOS = async function(id){
if(confirm("Deseja excluir esta OS?")){
await deleteDoc(doc(db,"ordens_servico",id));
carregarOS();
}
}

window.alterarStatus = async function(id){
let opcao = prompt("1 - Em andamento\n2 - Finalizada\n3 - Entregue");
let novo="";
if(opcao==="1") novo="Em andamento";
if(opcao==="2") novo="Finalizada";
if(opcao==="3") novo="Entregue";
if(novo){
await updateDoc(doc(db,"ordens_servico",id),{status:novo});
carregarOS();
}
}

window.imprimir = function(d){
const janela=window.open("","","width=500,height=700");
janela.document.write(`
<style>
body{font-family:Arial;padding:20px;}
h2{text-align:center;}
hr{margin:10px 0;}
p{font-size:14px;margin:5px 0;}
</style>
<h2>ORDEM DE SERVIÇO</h2>
<hr>
<p><b>Nº:</b> ${d.os}</p>
<p><b>Data:</b> ${new Date(d.data.seconds*1000).toLocaleString()}</p>
<p><b>Status:</b> ${d.status}</p>
<hr>
<p><b>Cliente:</b> ${d.cliente}</p>
<p><b>Equipamento:</b> ${d.equipamento}</p>
<p><b>Modelo:</b> ${d.modelo}</p>
<p><b>Série:</b> ${d.serie}</p>
<p><b>Defeito:</b> ${d.defeito}</p>
<hr>
<p><b>Loja:</b> ${d.loja}</p>
<p><b>Setor:</b> ${d.setor}</p>
<p><b>Ticket:</b> ${d.ticket}</p>
<p><b>Técnico:</b> ${d.tecnico}</p>
<br><br><br>_____________________________<br>Assinatura do Cliente
`);
janela.print();
}

window.voltar = function(){
window.location.href="index.html";
}

carregarOS();
</script>

</body>
</html>
